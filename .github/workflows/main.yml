name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Tumhara code layega
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Node.js setup karega
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Packages install karega
      - name: Install Dependencies
        run: npm install

      # 4. Capacitor ke zariye HTML ko Android me sync karega
      - name: Sync Capacitor
        run: npx cap sync android

      # 5. Java setup karega (APK banane ke liye zaroori hai)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 6. Android code ko compile karke APK banayega
      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 7. Bani hui APK ko upload karega taaki tum download kar sako
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: my-daily-tracker-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
